<html lang="it">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="mainMenu">
      <h1>SNAKE</h1>

      <div class="menu-option">
          <label>SPEED:</label>
          <select id="speedSelect">
              <option value="150">SLOW</option>
              <option value="100" selected>NORMAL</option>
              <option value="70">FAST</option>
              <option value="40">INSANE</option>
          </select>
      </div>

      <div class="menu-option">
        <label for="menuSkinSelect">SKIN:</label>
        <select id="menuSkinSelect"></select>
      </div>

      <button id="startBtn">START</button>
    </div>


    <h1>SNAKE</h1>

    <div id="top-bar">
        <div id="score-container">
            <span id="score-icon">⭐</span>
            <span id="score">0</span>
        </div>
        <div>Tempo: <span id="timer">00:00</span></div>
        <button id="pauseBtn">Pause</button>
    </div>
    <div style="position: relative;">
        <canvas id="game" width="400" height="400"></canvas>
        <div class="hud-container">
          <div class="bar-wrapper">
            <div id="powerBar" class="bar"></div>
          </div>
          <div class="bar-wrapper">
            <div id="cooldownBar" class="bar"></div>
          </div>
        </div>
        <div id="overlay">PAUSE</div>
    </div>
    <div id="combo-container">
        <div id="combo-frenzy"></div>
        <div id="combo-streak"></div>
    </div>
    <div id="legend">
      <div class="legend-item" data-type="common"><span class="legend-icon common"></span><span class="legend-text">Common (+1)</span></div>
      <div class="legend-item" data-type="rare"><span class="legend-icon rare"></span><span class="legend-text">Rare (+3)</span></div>
      <div class="legend-item" data-type="epic"><span class="legend-icon epic"></span><span class="legend-text">Epic (+5)</span></div>
      <div class="legend-item" data-type="malus"><span class="legend-icon malus"></span><span class="legend-text">Malus (-2)</span></div>
      <div class="legend-item" data-type="grow"><span class="legend-icon grow"></span><span class="legend-text">Grow</span></div>
      <div class="legend-item" data-type="multiplier"><span class="legend-icon multiplier"></span><span class="legend-text">Multiplier x2</span></div>
    </div>
    <!-- Pulsanti touch overlay -->
    <!-- Pulsanti frecce -->
    <div id="touchArrows" class="hidden">
      <button id="upBtn">↑</button>
      <button id="leftBtn">←</button>
      <button id="downBtn">↓</button>
      <button id="rightBtn">→</button>
    </div>

    <!-- Pulsanti speciali -->
    <div id="touchControls" class="hidden">
      <button id="restartBtn">⟳</button>
      <button id="touchPauseBtn">⏸</button>
      <button id="specialBtn">X</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
